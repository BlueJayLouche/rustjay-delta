name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            features: "--no-default-features --features webcam"
          - name: macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            features: "--no-default-features --features webcam"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-ci-

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Build
        run: cargo build --target ${{ matrix.target }} ${{ matrix.features }}
