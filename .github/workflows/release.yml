name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: rustjay-delta-macos-arm64
          - target: x86_64-apple-darwin
            asset: rustjay-delta-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-${{ matrix.target }}-release-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features webcam

      - name: Create .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="RustJay Delta.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/${{ matrix.target }}/release/rustjay-delta "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/"*
          sed "s/VERSION/$VERSION/g" macos/Info.plist > "$APP/Contents/Info.plist"
          cp macos/AppIcon.icns "$APP/Contents/Resources/"

      - name: Ad-hoc code sign
        run: codesign --force --deep -s - "RustJay Delta.app"

      - name: Create .dmg
        run: |
          hdiutil create -volname "RustJay Delta" \
            -srcfolder "RustJay Delta.app" \
            -ov -format UDZO \
            ${{ matrix.asset }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.dmg

  release:
    name: Create Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
